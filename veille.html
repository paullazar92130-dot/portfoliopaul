<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paul Lazar — Veille technologique : Yoti</title>

  <script>try { document.documentElement.dataset.theme = localStorage.getItem('pl-theme') || 'light'; } catch (e) {}</script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root, [data-theme="light"] {
      --bg:#faf8f4; --surface:#f1ede7; --card:#f4f1eb;
      --ink:#1c1916; --muted:#8b847b; --rule:#e3ded5; --accent:#9c7c54;
      --shadow:0 1px 2px rgba(28,25,22,.04), 0 8px 30px rgba(28,25,22,.06);
    }
    [data-theme="dark"] {
      --bg:#141210; --surface:#1d1916; --card:#1f1a16;
      --ink:#f0ebe3; --muted:#9b938a; --rule:#2c2722; --accent:#c4a47b;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 30px rgba(0,0,0,.4);
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { overflow-x:hidden; background:var(--bg); color:var(--ink);
      font-family:'DM Sans',sans-serif; font-weight:300; -webkit-font-smoothing:antialiased;
      transition:background .45s ease, color .45s ease; }

    .navlinks a { font-size:.78rem; font-weight:400; letter-spacing:.08em; text-transform:uppercase;
      color:var(--muted); text-decoration:none; transition:color .2s; }
    .navlinks a:hover { color:var(--ink); }
    .burger { display:none; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:4px; }
    .burger span { display:block; width:22px; height:1px; background:var(--ink); transition:all .25s; }
    .icon-btn { display:inline-grid; place-items:center; width:38px; height:38px; border-radius:50%;
      border:1px solid var(--rule); background:var(--card); color:var(--ink); cursor:pointer; transition:border-color .2s, transform .2s; }
    .icon-btn:hover { border-color:var(--ink); transform:translateY(-1px); }
    .deck-btn { display:inline-flex; align-items:center; gap:.4rem; font-size:.82rem; font-weight:500; color:var(--ink);
      background:var(--bg); border:1px solid var(--rule); border-radius:4px; padding:.55rem .95rem; cursor:pointer; font-family:inherit; transition:border-color .2s, transform .18s; }
    .deck-btn:hover:not(:disabled) { border-color:var(--ink); transform:translateY(-1px); }
    .footer-link { color:var(--muted); text-decoration:none; transition:color .2s; }
    .footer-link:hover { color:var(--ink); }
    @media(max-width:760px){
      .navlinks { display:none!important; }
      .burger { display:flex!important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;
    const { motion, useInView, AnimatePresence } = Motion;

    function useTheme() {
      const [theme, setTheme] = useState(() => {
        try { return localStorage.getItem('pl-theme') || 'light'; } catch (e) { return 'light'; }
      });
      useEffect(() => {
        document.documentElement.dataset.theme = theme;
        try { localStorage.setItem('pl-theme', theme); } catch (e) {}
      }, [theme]);
      return [theme, () => setTheme(t => (t === 'light' ? 'dark' : 'light'))];
    }

    const I = {
      arrow: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14m0 0-6-6m6 6-6 6"/></svg>,
      back: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5m0 0 6 6m-6-6 6-6"/></svg>,
      sun: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>,
      moon: <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>,
    };

    function ScrollReveal({ children, delay = 0 }) {
      const ref = useRef(null);
      const inView = useInView(ref, { once:true, margin:"-60px" });
      return (
        <motion.div ref={ref} initial={{ opacity:0, y:24 }} animate={inView ? { opacity:1, y:0 } : {}}
          transition={{ duration:0.65, delay, ease:[0.22,1,0.36,1] }}>{children}</motion.div>
      );
    }

    const C = { bg:"var(--bg)", ink:"var(--ink)", muted:"var(--muted)", rule:"var(--rule)", card:"var(--card)", accent:"var(--accent)" };
    const s = {
      wrap: { maxWidth:1000, margin:"0 auto", padding:"0 2rem" },
      nav: { position:"fixed", top:0, left:0, right:0, zIndex:100, background:"var(--bg)", borderBottom:`1px solid ${C.rule}`, backdropFilter:"saturate(180%) blur(6px)" },
      navInner: { display:"flex", justifyContent:"space-between", alignItems:"center", height:60, gap:"1.5rem" },
      logo: { fontFamily:"'DM Serif Display',serif", fontSize:"1.15rem", letterSpacing:"-0.01em", color:C.ink, textDecoration:"none" },
      head: { padding:"130px 0 50px" },
      kicker: { fontSize:"0.72rem", letterSpacing:"0.14em", textTransform:"uppercase", color:C.accent, fontWeight:500, marginBottom:"1rem" },
      title: { fontFamily:"'DM Serif Display',serif", fontSize:"clamp(2.6rem,8vw,4.8rem)", fontWeight:400, lineHeight:1, letterSpacing:"-0.02em", color:C.ink },
      headDesc: { maxWidth:600, fontSize:"1.02rem", color:C.muted, lineHeight:1.75, marginTop:"1.4rem" },
      stage: { paddingBottom:"90px" },
      footer: { padding:"2.2rem 0", borderTop:`1px solid ${C.rule}` },
      footerInner: { display:"flex", justifyContent:"space-between", alignItems:"center", gap:"1rem", flexWrap:"wrap" },
      footerText: { fontSize:"0.74rem", color:C.muted },
    };

    const SLIDES = [
      { kind:"title", eyebrow:"Veille technologique", title:"Yoti", subtitle:"L'identité numérique et l'estimation d'âge par intelligence artificielle", meta:"Paul Lazar · BTS SIO SLAM" },
      { kind:"content", num:"01", title:"Qu'est-ce que Yoti ?", bullets:[
        "Entreprise britannique d'identité numérique, fondée en 2014 à Londres.",
        "Fondateurs : Robin Tombs (PDG), Noel Hayden et Duncan Francis.",
        "Mission : créer une identité numérique de confiance, sécurisée et respectueuse de la vie privée.",
        "Produits : application Yoti, vérification de documents, estimation d'âge par IA et signature électronique." ] },
      { kind:"content", num:"02", title:"Le contexte : vérifier l'âge en ligne", bullets:[
        "Juillet 2025 : l'Online Safety Act entre en vigueur au Royaume-Uni — les sites sensibles doivent vérifier que l'utilisateur a 18 ans ou plus.",
        "Les méthodes classiques (carte d'identité, carte bancaire) posent des problèmes de confidentialité.",
        "Besoin d'une solution rapide, fiable et protectrice des données personnelles.",
        "Février 2026 : l'Ofcom a ouvert plus de 90 enquêtes et infligé 6 amendes pour non-conformité." ] },
      { kind:"content", num:"03", title:"La technologie clé : l'estimation d'âge faciale", bullets:[
        "Une IA estime la tranche d'âge à partir d'une photo prise en temps réel.",
        "Aucun document d'identité requis ni stocké : c'est de la minimisation des données.",
        "Détection du vivant (liveness) pour vérifier qu'il s'agit d'une vraie personne.",
        "Les données biométriques sont chiffrées puis supprimées après l'estimation." ] },
      { kind:"content", num:"04", title:"Comment ça marche ?", bullets:[
        "1. L'utilisateur prend un selfie en direct via son navigateur ou l'app.",
        "2. Le contrôle de liveness confirme une présence réelle.",
        "3. Le modèle d'IA estime l'âge et le compare au seuil requis (ex. 18 ans).",
        "4. Le site reçoit seulement « majeur / mineur » — jamais l'image ni l'identité." ] },
      { kind:"content", num:"05", title:"Chiffres clés — 2025", bullets:[
        "Chiffre d'affaires : 29,0 M£ en 2025, soit +62 % par rapport à 2024 (17,9 M£).",
        "Téléchargements mondiaux : 5,55 millions en 2025 (contre 1,62 million en 2024).",
        "Modèle yoti-003 (juin 2025) classé n°1 par le NIST pour l'estimation des 13-16 ans.",
        "Juillet 2025 : le gouvernement britannique teste cette IA pour évaluer l'âge de demandeurs d'asile sans papiers." ] },
      { kind:"content", num:"06", title:"Enjeux & limites", bullets:[
        "Vie privée : l'usage de la biométrie reste sensible et débattu, malgré la minimisation des données.",
        "Biais des algorithmes : la précision peut varier selon l'âge, le teint ou les conditions de prise de vue.",
        "Conformité : respect du RGPD en Europe et des autorités comme l'Ofcom au Royaume-Uni.",
        "Contournement : recours aux VPN, ce qui interroge l'efficacité réelle." ] },
      { kind:"content", num:"07", title:"Pourquoi cela m'intéresse (BTS SIO)", bullets:[
        "L'identité numérique touche à la sécurité, à l'IA et à la conformité réglementaire — des sujets centraux.",
        "Elle illustre des notions clés du SLAM : authentification, protection des données, API et services tiers.",
        "Un bon exemple où développement, éthique et législation se rencontrent." ] },
      { kind:"sources", num:"08", title:"Sources", bullets:[
        "Site officiel & blog Yoti — yoti.com",
        "Article « Yoti » — Wikipedia (en.wikipedia.org/wiki/Yoti)",
        "Biometric Update — Online Safety Act & Ofcom (biometricupdate.com)",
        "NIST — évaluation des modèles d'estimation d'âge facial (nist.gov)" ] },
    ];

    function Nav({ theme, toggle }) {
      const [open, setOpen] = useState(false);
      const links = [["index.html#profil","Profil"],["index.html#skills","Compétences"],["index.html#projets","Projets"],["index.html#contact","Contact"]];
      return (
        <React.Fragment>
          <nav style={s.nav}>
            <div style={{ ...s.wrap, ...s.navInner, maxWidth:1180 }}>
              <a href="index.html" style={s.logo}>Paul Lazar</a>
              <div style={{ display:"flex", alignItems:"center", gap:"1.6rem" }}>
                <ul className="navlinks" style={{ display:"flex", gap:"1.6rem", listStyle:"none" }}>
                  {links.map(([h,l]) => <li key={h}><a href={h}>{l}</a></li>)}
                </ul>
                <button className="icon-btn" onClick={toggle} aria-label="Changer de thème" title="Mode jour / nuit">
                  <AnimatePresence mode="wait" initial={false}>
                    <motion.span key={theme} initial={{ rotate:-40, opacity:0 }} animate={{ rotate:0, opacity:1 }} exit={{ rotate:40, opacity:0 }} transition={{ duration:0.25 }} style={{ display:"grid", placeItems:"center" }}>
                      {theme === "light" ? I.moon : I.sun}
                    </motion.span>
                  </AnimatePresence>
                </button>
                <button className="burger" onClick={() => setOpen(o => !o)} aria-label="Menu">
                  <motion.span animate={open ? { rotate:45, y:6 } : { rotate:0, y:0 }} />
                  <motion.span animate={open ? { opacity:0 } : { opacity:1 }} />
                  <motion.span animate={open ? { rotate:-45, y:-6 } : { rotate:0, y:0 }} />
                </button>
              </div>
            </div>
          </nav>
          <AnimatePresence>
            {open && (
              <motion.div initial={{ opacity:0 }} animate={{ opacity:1 }} exit={{ opacity:0 }}
                style={{ position:"fixed", top:60, left:0, right:0, bottom:0, background:"var(--bg)", zIndex:99, display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", gap:"2.2rem" }}>
                {links.map(([h,l], i) => (
                  <motion.a key={h} href={h} onClick={() => setOpen(false)}
                    initial={{ opacity:0, y:16 }} animate={{ opacity:1, y:0 }} exit={{ opacity:0, y:16 }} transition={{ delay:i*0.06 }}
                    style={{ fontFamily:"'DM Serif Display',serif", fontSize:"2rem", color:C.ink, textDecoration:"none" }}>{l}</motion.a>
                ))}
              </motion.div>
            )}
          </AnimatePresence>
        </React.Fragment>
      );
    }

    /* ════════ DIAPORAMA YOTI ════════ */
    function Slideshow() {
      const [[page, dir], setPage] = useState([0, 0]);
      const total = SLIDES.length;
      const slide = SLIDES[page];
      const paginate = (d) => setPage(([p]) => [Math.min(Math.max(p + d, 0), total - 1), d]);

      useEffect(() => {
        const onKey = (e) => { if (e.key === "ArrowRight") paginate(1); if (e.key === "ArrowLeft") paginate(-1); };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [total]);

      const variants = { enter:(d)=>({opacity:0,x:d>0?40:-40}), center:{opacity:1,x:0}, exit:(d)=>({opacity:0,x:d>0?-40:40}) };
      const deck = {
        frame:{ position:"relative", border:`1px solid ${C.rule}`, borderRadius:8, background:C.card, aspectRatio:"16 / 9", overflow:"hidden", boxShadow:"var(--shadow)" },
        progress:{ position:"absolute", top:0, left:0, height:3, background:C.accent, zIndex:3 },
        kicker:{ fontSize:"0.66rem", letterSpacing:"0.18em", textTransform:"uppercase", color:C.accent, fontWeight:500, marginBottom:"0.7rem" },
        sTitle:{ fontFamily:"'DM Serif Display',serif", fontSize:"clamp(1.4rem,5vw,2.6rem)", fontWeight:400, lineHeight:1.1, letterSpacing:"-0.02em", color:C.ink, marginBottom:"1rem" },
        subtitle:{ fontSize:"clamp(0.9rem,2.6vw,1.15rem)", color:C.muted, lineHeight:1.6, maxWidth:560 },
        meta:{ fontSize:"0.74rem", color:C.muted, marginTop:"1.6rem", letterSpacing:"0.04em" },
        ul:{ listStyle:"none", display:"flex", flexDirection:"column", gap:"0.85rem" },
        li:{ display:"flex", gap:"0.7rem", fontSize:"clamp(0.82rem,2.3vw,1rem)", color:C.ink, lineHeight:1.55 },
        dot:{ flexShrink:0, marginTop:"0.55em", width:6, height:6, borderRadius:"50%", background:C.accent },
        controls:{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:"1rem", marginTop:"1.2rem" },
        dots:{ display:"flex", gap:"0.45rem", alignItems:"center" },
        counter:{ fontSize:"0.74rem", letterSpacing:"0.1em", color:C.muted, fontVariantNumeric:"tabular-nums" },
      };

      return (
        <div>
          <div style={deck.frame}>
            <motion.div style={deck.progress} animate={{ width:`${((page+1)/total)*100}%` }} transition={{ duration:0.4, ease:[0.22,1,0.36,1] }} />
            <AnimatePresence mode="wait" custom={dir}>
              <motion.div key={page} custom={dir} variants={variants} initial="enter" animate="center" exit="exit"
                transition={{ duration:0.4, ease:[0.22,1,0.36,1] }}
                style={{ position:"absolute", inset:0, padding:"clamp(1.4rem,4vw,3rem)", display:"flex", flexDirection:"column", justifyContent:"center" }}>
                {slide.kind === "title" ? (
                  <div>
                    <div style={deck.kicker}>{slide.eyebrow}</div>
                    <div style={deck.sTitle}>{slide.title}</div>
                    <p style={deck.subtitle}>{slide.subtitle}</p>
                    <div style={deck.meta}>{slide.meta}</div>
                  </div>
                ) : (
                  <div>
                    <div style={deck.kicker}>{slide.num} — Yoti</div>
                    <div style={{ ...deck.sTitle, fontSize:"clamp(1.2rem,4vw,2rem)", marginBottom:"1.3rem" }}>{slide.title}</div>
                    <ul style={deck.ul}>
                      {slide.bullets.map((b, i) => (
                        <motion.li key={i} style={deck.li} initial={{ opacity:0, y:8 }} animate={{ opacity:1, y:0 }} transition={{ delay:0.15+i*0.08, duration:0.4 }}>
                          <span style={deck.dot} /><span>{b}</span>
                        </motion.li>
                      ))}
                    </ul>
                  </div>
                )}
              </motion.div>
            </AnimatePresence>
          </div>
          <div style={deck.controls}>
            <button className="deck-btn" onClick={() => paginate(-1)} disabled={page===0} style={{ opacity:page===0?0.4:1 }}>{I.back} Précédent</button>
            <div style={deck.dots}>
              {SLIDES.map((_, i) => <span key={i} style={{ width:i===page?16:6, height:6, borderRadius:3, background:i===page?C.accent:C.rule, transition:"all .3s" }} />)}
            </div>
            <button className="deck-btn" onClick={() => paginate(1)} disabled={page===total-1} style={{ opacity:page===total-1?0.4:1 }}>Suivant {I.arrow}</button>
          </div>
          <div style={{ textAlign:"center", marginTop:"0.8rem" }}>
            <span style={deck.counter}>{String(page+1).padStart(2,"0")} / {String(total).padStart(2,"0")}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [theme, toggle] = useTheme();
      return (
        <div id="top">
          <Nav theme={theme} toggle={toggle} />

          <header style={s.head}>
            <div style={s.wrap}>
              <ScrollReveal>
                <a className="footer-link" href="index.html" style={{ display:"inline-flex", alignItems:"center", gap:"0.4rem", fontSize:"0.8rem", marginBottom:"1.6rem" }}>{I.back} Retour au portfolio</a>
                <div style={s.kicker}>Veille technologique</div>
                <h1 style={s.title}>Yoti</h1>
                <p style={s.headDesc}>L'identité numérique et l'estimation d'âge par intelligence artificielle. Naviguez dans la présentation avec les flèches <span style={{ color:C.ink }}>←</span> <span style={{ color:C.ink }}>→</span> du clavier ou les boutons.</p>
              </ScrollReveal>
            </div>
          </header>

          <section style={s.stage}>
            <div style={s.wrap}>
              <ScrollReveal delay={0.1}><Slideshow /></ScrollReveal>
            </div>
          </section>

          <footer style={s.footer}>
            <div style={{ ...s.wrap, ...s.footerInner, maxWidth:1180 }}>
              <span style={s.footerText}>© 2026 Paul Lazar</span>
              <a className="footer-link" href="index.html" style={{ ...s.footerText, display:"inline-flex", alignItems:"center", gap:"0.4rem" }}>{I.back} Retour au portfolio</a>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
